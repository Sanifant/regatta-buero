# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - src/**
  pull_request:
    branches: [ "main" ]
    paths:
      - src/**

jobs:
  build:

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        project: [
            'LRV Regattabuero.sln'
            ]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./src


    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Test
      run: |
        rm -rf ../artifacts/test-results ../artifacts/coverage-report
        dotnet test --no-build --verbosity normal --settings ../coverage.runsettings --collect:"XPlat Code Coverage" --results-directory ../artifacts/test-results

    - name: Restore local .NET tools
      run: dotnet tool restore
      working-directory: .

    - name: Generate coverage report
      run: dotnet tool run reportgenerator -reports:"artifacts/test-results/**/coverage.cobertura.xml" -targetdir:"artifacts/coverage-report" -reporttypes:"Html;TextSummary"
      working-directory: .

    - name: Print coverage summary
      run: cat artifacts/coverage-report/Summary.txt
      working-directory: .

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: artifacts/coverage-report
